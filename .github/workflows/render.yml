name: Widget Render

# 위젯 UI(RemoteViews)를 CI 에뮬레이터에서 실제 렌더 → 스크린샷 아티팩트.
# Public repo 라 GitHub Actions 무료·무제한. Tauri/네이티브 없음 → 순수 Android APK(빠름).
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (17, Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          mkdir -p "$HOME/gradle" && unzip -q /tmp/gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: |
          gradle assembleDebug --no-daemon --stacktrace
          APK=$(find "$GITHUB_WORKSPACE" -name '*.apk' | head -1)
          echo "found APK: $APK"
          test -n "$APK" || { echo "!!! NO APK PRODUCED"; ls -R "$GITHUB_WORKSPACE/app/build" 2>/dev/null | head -60; exit 1; }
          cp "$APK" /tmp/widget-demo.apk
          echo "copied to /tmp/widget-demo.apk"; ls -la /tmp/widget-demo.apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Render widgets on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          script: |
            set -e
            mkdir -p /tmp/shots
            adb wait-for-device
            adb install -r /tmp/widget-demo.apk
            adb shell am start -S -n com.dayknit.widget/.WidgetGalleryActivity --es which month
            sleep 6
            adb exec-out screencap -p > /tmp/shots/01-month.png
            adb shell am start -S -n com.dayknit.widget/.WidgetGalleryActivity --es which todo
            sleep 6
            adb exec-out screencap -p > /tmp/shots/02-todo.png
            adb shell am start -S -n com.dayknit.widget/.WidgetGalleryActivity --es which timeline
            sleep 6
            adb exec-out screencap -p > /tmp/shots/03-timeline.png
            adb shell am start -S -n com.dayknit.widget/.WidgetConfigActivity --ei appWidgetId 1 --ez demoTimeline true
            sleep 5
            adb exec-out screencap -p > /tmp/shots/04-settings.png
            adb shell am start -S -n com.dayknit.widget/.QuickAddActivity
            sleep 4
            adb exec-out screencap -p > /tmp/shots/05-quickadd.png
            echo "=== captured ===" ; ls -la /tmp/shots

      - name: Upload screenshots (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget-screenshots
          path: /tmp/shots/*.png
          if-no-files-found: warn

      - name: Build Pages site
        if: success()
        run: |
          mkdir -p site
          cp /tmp/shots/*.png site/
          cat > site/index.html <<'HTML'
          <!doctype html><html lang="ko"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>DayKnit 위젯 미리보기</title>
          <style>
            body{font-family:-apple-system,system-ui,sans-serif;background:#eef1f5;margin:0;padding:24px;color:#1f2328}
            h1{font-size:20px;margin:0 0 4px}
            .sub{color:#6b7280;font-size:13px;margin-bottom:20px}
            .grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center}
            figure{margin:0;background:#fff;border:1px solid #e2e6ea;border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
            img{display:block;width:300px;max-width:92vw;border-radius:6px}
            figcaption{margin-top:8px;font-size:13px;font-weight:600;text-align:center}
          </style></head>
          <body>
            <h1>DayKnit 홈 위젯 미리보기</h1>
            <div class="sub">CI 에뮬레이터 실제 렌더 · 빌드 #${{ github.run_number }} · push 마다 자동 업데이트</div>
            <div class="grid">
              <figure><img src="01-month.png?v=${{ github.run_number }}"><figcaption>월간 (4x5)</figcaption></figure>
              <figure><img src="02-todo.png?v=${{ github.run_number }}"><figcaption>할 일</figcaption></figure>
              <figure><img src="03-timeline.png?v=${{ github.run_number }}"><figcaption>타임라인 (데이뷰)</figcaption></figure>
              <figure><img src="04-settings.png?v=${{ github.run_number }}"><figcaption>위젯 설정</figcaption></figure>
              <figure><img src="05-quickadd.png?v=${{ github.run_number }}"><figcaption>위젯에서 바로 추가</figcaption></figure>
            </div>
          </body></html>
          HTML
          ls -la site

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        if: success()
        uses: actions/deploy-pages@v4
